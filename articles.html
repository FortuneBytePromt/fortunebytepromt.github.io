<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:    #0e1120;
    --deep:   #141829;
    --card:   #1b2038;
    --card2:  #1f2540;
    --border: #2a3358;
    --gold:   #c9a84c;
    --gold-lt:#e8c97a;
    --silver: #8fa0c0;
    --text:   #dce4f5;
    --muted:  #6b7fa8;
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: "Noto Sans TC", sans-serif;
    background: var(--ink);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.75;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 18% 12%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 70% 20%, rgba(201,168,76,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 42% 65%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 75%, rgba(255,255,255,0.18) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  .site-header {
    padding: 48px 0 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }

  .site-header h1 {
    font-family: "Noto Serif TC", serif;
    font-size: 1.9rem;
    color: var(--gold-lt);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .site-header p {
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 30px;
    color: var(--silver);
    text-decoration: none;
    font-size: 0.85rem;
    margin-top: 18px;
    transition: border-color 0.2s, color 0.2s;
  }

  .back-btn:hover { border-color: var(--gold); color: var(--gold-lt); }

  /* ── Category sections ── */
  .category {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 22px;
    transition: border-color 0.2s;
  }

  .category:hover { border-color: #3d4e7a; }

  .category-title {
    font-family: "Noto Serif TC", serif;
    font-size: 1.05rem;
    color: var(--gold-lt);
    letter-spacing: 0.05em;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .category-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
    margin-left: 8px;
  }

  /* ── Article list ── */
  .article-list { list-style: none; }

  .article-item {
    border-bottom: 1px solid rgba(42,51,88,0.6);
    transition: background 0.15s;
  }

  .article-item:last-child { border-bottom: none; }

  .article-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 10px;
    color: var(--silver);
    text-decoration: none;
    font-size: 0.95rem;
    border-radius: var(--radius-sm);
    transition: color 0.2s, background 0.2s, padding-left 0.2s;
  }

  .article-link::before {
    content: '卦';
    font-family: "Noto Serif TC", serif;
    font-size: 0.7rem;
    color: var(--gold);
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    padding: 2px 6px;
    flex-shrink: 0;
    letter-spacing: 0;
  }

  .article-item:nth-child(-n+2) .article-link::before { content: '例'; }

  .article-link:hover {
    color: var(--gold-lt);
    background: rgba(201,168,76,0.05);
    padding-left: 16px;
  }

  /* ── Footer ── */
  .site-footer {
    border-top: 1px solid var(--border);
    padding: 24px 0 40px;
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    position: relative;
    z-index: 1;
    margin-top: 10px;
  }
</style>
</head>
