<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 | Fortune Byte 易算</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:    #0e1120;
    --deep:   #141829;
    --card:   #1b2038;
    --border: #2a3358;
    --gold:   #c9a84c;
    --gold-lt:#e8c97a;
    --silver: #8fa0c0;
    --text:   #dce4f5;
    --muted:  #6b7fa8;
    --green:  #4ade80;
    --red:    #f87171;
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: "Noto Sans TC", sans-serif;
    background: var(--ink);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 78% 18%, rgba(201,168,76,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 72%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 65%, rgba(255,255,255,0.18) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Card ── */
  .login-card {
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 44px 40px 36px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .login-card::before {
    content: '';
    display: block;
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 28px;
    border-radius: 2px;
  }

  /* ── Logo ── */
  .logo {
    font-family: "Noto Serif TC", serif;
    font-size: 1.8rem;
    background: linear-gradient(135deg, var(--gold), var(--gold-lt));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  .logo-sub {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  /* ── Tabs ── */
  .tab-row {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 30px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: "Noto Sans TC", sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .tab-btn.active {
    background: var(--deep);
    color: var(--gold-lt);
  }

  /* ── Inputs ── */
  .form-group { margin-bottom: 14px; text-align: left; }

  .form-group label {
    display: block;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    background: var(--deep);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: "Noto Sans TC", sans-serif;
    font-size: 0.95rem;
    padding: 11px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--gold);
    outline: none;
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }

  /* ── Buttons ── */
  .btn-primary {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--gold) 0%, #a8742e 100%);
    color: #0e1120;
    border: none;
    border-radius: var(--radius-sm);
    font-family: "Noto Sans TC", sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: filter 0.2s, transform 0.2s;
    letter-spacing: 0.04em;
  }

  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-google {
    width: 100%;
    padding: 12px;
    background: var(--deep);
    color: var(--silver);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: "Noto Sans TC", sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-google:hover { border-color: var(--gold); color: var(--text); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 18px 0;
    color: var(--muted);
    font-size: 0.8rem;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Messages ── */
  .msg {
    font-size: 0.85rem;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    margin-top: 12px;
    display: none;
    text-align: left;
  }

  .msg.error   { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
  .msg.success { background: rgba(74,222,128,0.1);  border: 1px solid rgba(74,222,128,0.3);  color: var(--green); }
  .msg.show    { display: block; }

  /* ── Footer links ── */
  .footer-links {
    margin-top: 22px;
    font-size: 0.82rem;
    color: var(--muted);
  }

  .footer-links a {
    color: var(--gold);
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer-links a:hover { color: var(--gold-lt); }

  .forgot-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.82rem;
    cursor: pointer;
    font-family: "Noto Sans TC", sans-serif;
    text-decoration: underline;
    margin-top: 8px;
    transition: color 0.2s;
  }

  .forgot-btn:hover { color: var(--gold); }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">☯ Fortune Byte</div>
  <div class="logo-sub">Yi Jing · Divination</div>

  <div class="tab-row">
    <button class="tab-btn active" id="tabLogin"    onclick="showTab('login')">登入</button>
    <button class="tab-btn"        id="tabRegister" onclick="showTab('register')">註冊</button>
  </div>

  <!-- ── Login form ── -->
  <div id="formLogin">
    <div class="form-group">
      <label for="loginEmail">電子郵件</label>
      <input type="email" id="loginEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label for="loginPassword">密碼</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="emailLogin()">登入</button>
    <button class="forgot-btn" onclick="resetPassword()">忘記密碼？</button>

    <div class="divider">或</div>
    <button class="btn-google" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      使用 Google 登入
    </button>
  </div>

  <!-- ── Register form ── -->
  <div id="formRegister" style="display:none;">
    <div class="form-group">
      <label for="regEmail">電子郵件</label>
      <input type="email" id="regEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label for="regPassword">密碼</label>
      <input type="password" id="regPassword" placeholder="至少 6 個字元">
    </div>
    <div class="form-group">
      <label for="regPassword2">確認密碼</label>
      <input type="password" id="regPassword2" placeholder="再輸入一次">
    </div>
    <button class="btn-primary" id="regBtn" onclick="emailRegister()">建立帳號</button>

    <div class="divider">或</div>
    <button class="btn-google" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      使用 Google 註冊
    </button>
  </div>

  <!-- Messages -->
  <div id="errorMsg"   class="msg error"></div>
  <div id="successMsg" class="msg success"></div>

  <div class="footer-links">
    <a href="index.html">← 返回首頁</a>
  </div>
</div>

<script>
  function showTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('formLogin').style.display    = isLogin ? '' : 'none';
    document.getElementById('formRegister').style.display = isLogin ? 'none' : '';
    document.getElementById('tabLogin').classList.toggle('active',    isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    clearMessages();
  }

  function showError(msg)   { showMsg('errorMsg', msg); }
  function showSuccess(msg) { showMsg('successMsg', msg); }

  function showMsg(id, text) {
    clearMessages();
    const el = document.getElementById(id);
    el.textContent = text;
    el.classList.add('show');
  }

  function clearMessages() {
    ['errorMsg','successMsg'].forEach(id => {
      const el = document.getElementById(id);
      el.textContent = '';
      el.classList.remove('show');
    });
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? '處理中…' : (btnId === 'loginBtn' ? '登入' : '建立帳號');
  }

  async function emailLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { showError('請填寫電子郵件和密碼'); return; }
    setLoading('loginBtn', true);
    clearMessages();
    try {
      await firebase.auth().signInWithEmailAndPassword(email, password);
      showSuccess('登入成功！正在跳轉…');
      setTimeout(() => window.location.href = 'index.html', 1500);
    } catch (e) {
      showError(firebaseErrorMsg(e.code));
      setLoading('loginBtn', false);
    }
  }

  async function emailRegister() {
    const email = document.getElementById('regEmail').value.trim();
    const pw1   = document.getElementById('regPassword').value;
    const pw2   = document.getElementById('regPassword2').value;
    if (!email || !pw1) { showError('請填寫電子郵件和密碼'); return; }
    if (pw1 !== pw2)    { showError('兩次輸入的密碼不一致'); return; }
    if (pw1.length < 6) { showError('密碼至少需要 6 個字元'); return; }
    setLoading('regBtn', true);
    clearMessages();
    try {
      await firebase.auth().createUserWithEmailAndPassword(email, pw1);
      showSuccess('註冊成功！正在跳轉…');
      setTimeout(() => window.location.href = 'index.html', 1500);
    } catch (e) {
      showError(firebaseErrorMsg(e.code));
      setLoading('regBtn', false);
    }
  }

  async function googleLogin() {
    clearMessages();
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await firebase.auth().signInWithPopup(provider);
      showSuccess('登入成功！正在跳轉…');
      setTimeout(() => window.location.href = 'index.html', 1500);
    } catch (e) {
      showError('Google 登入失敗，請稍後再試');
    }
  }

  async function resetPassword() {
    const email = document.getElementById('loginEmail').value.trim();
    if (!email) { showError('請先輸入電子郵件地址'); return; }
    clearMessages();
    try {
      await firebase.auth().sendPasswordResetEmail(email);
      showSuccess('重設密碼郵件已發送，請檢查信箱');
    } catch (e) {
      showError(firebaseErrorMsg(e.code));
    }
  }

  function firebaseErrorMsg(code) {
    const map = {
      'auth/invalid-email':        '無效的電子郵件格式',
      'auth/user-disabled':        '此帳號已被停用',
      'auth/user-not-found':       '找不到此帳號',
      'auth/wrong-password':       '密碼錯誤',
      'auth/email-already-in-use': '此電子郵件已被註冊',
      'auth/weak-password':        '密碼強度不足',
      'auth/too-many-requests':    '嘗試次數過多，請稍後再試',
    };
    return map[code] || '發生錯誤，請稍後再試';
  }
</script>
</body>
</html>
